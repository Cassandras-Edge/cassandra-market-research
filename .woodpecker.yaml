when:
  - event: [push, pull_request]

steps:
  # ── CI: tests (all branches, push + PR) ──

  - name: backend-test
    image: python:3.12-slim
    failure: ignore
    when:
      - event: [push, pull_request]
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apt-get update && apt-get install -y --no-install-recommends git ca-certificates && rm -rf /var/lib/apt/lists/*
      - printf "machine github.com\nlogin x-access-token\npassword $GITHUB_TOKEN\n" > /root/.netrc && chmod 600 /root/.netrc
      - cd backend
      - pip install -e ".[dev]"
      - pytest --ignore=tests/test_live.py -k "not test_earnings_preview"

  # ── Deploy: Docker image via BuildKit (push to main only) ──

  - name: build-backend
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
    environment:
      AUTH_YAML_CONTENT:
        from_secret: auth_yaml
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        cat > /tmp/buildkitd.toml <<'TOML'
        [registry."github.com"]
          mirrors = ["github.com"]
        TOML
      - >
        buildctl
        --addr tcp://buildkitd.infra.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=backend
        --local dockerfile=backend
        --opt "build-arg:AUTH_YAML_CONTENT=$AUTH_YAML_CONTENT"
        --opt "build-arg:GITHUB_TOKEN=$GITHUB_TOKEN"
        --output type=image,name=registry.infra.svc.cluster.local:5000/market-research:latest,push=true,registry.insecure=true

  - name: restart-deployment
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
    commands:
      - |
        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        APISERVER=https://kubernetes.default.svc
        NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        wget -qO- \
          --header="Authorization: Bearer $TOKEN" \
          --header="Content-Type: application/strategic-merge-patch+json" \
          --method=PATCH \
          --body-data="{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$NOW\"}}}}}" \
          --no-check-certificate \
          "$APISERVER/apis/apps/v1/namespaces/production/deployments/market-research"
